<nav class="navbar" id="main-navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
      <img src="abai-logo.jpg" alt="Abai University" class="brand-logo" />
      <span class="brand-text">Abai<span class="brand-accent">Review</span></span>
    </a>

    <button
      class="navbar-toggle"
      type="button"
      (click)="toggleMenu()"
      [class.open]="menuOpen()"
      aria-label="Меню"
      [attr.aria-expanded]="menuOpen()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar-collapse" [class.open]="menuOpen()">
      <div class="navbar-menu">
        <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Главная</a>
        <a routerLink="/subjects" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Предметы</a>
        <a routerLink="/professors" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Преподаватели</a>
        <a routerLink="/wishlist" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Избранное</a>
      </div>

      <div class="navbar-auth">
        @if (!isAuthenticated()) {
          <a routerLink="/login" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Войти</a>
          <a routerLink="/register" routerLinkActive="active" class="nav-link nav-link-highlight" (click)="closeMenu()">Регистрация</a>
        }

        @if (isAuthenticated()) {
          <a routerLink="/profile" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Профиль</a>
          <button (click)="logout()" class="nav-link logout-btn">Выйти</button>
        }
      </div>
    </div>
  </div>
</nav>
