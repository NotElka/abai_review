<nav class="navbar" id="main-navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand">
      <img src="abai-logo.jpg" alt="Abai University" class="brand-logo" />
      <span class="brand-text">Abai<span class="brand-accent">Review</span></span>
    </a>

    <div class="navbar-menu">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">Главная</a>
      <a routerLink="/subjects" routerLinkActive="active" class="nav-link">Предметы</a>
      <a routerLink="/professors" routerLinkActive="active" class="nav-link">Преподаватели</a>
      <a routerLink="/wishlist" routerLinkActive="active" class="nav-link">Избранное</a>
    </div>

    <div class="navbar-auth">
      @if (!isAuthenticated()) {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Войти</a>
        <a routerLink="/register" routerLinkActive="active" class="nav-link nav-link-highlight">Регистрация</a>
      }

      @if (isAuthenticated()) {
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">Профиль</a>
        <button (click)="logout()" class="nav-link logout-btn">Выйти</button>
      }
    </div>
  </div>
</nav>
