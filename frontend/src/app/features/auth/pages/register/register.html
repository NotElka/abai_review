<div class="auth-container">
  <div class="auth-card">
    <h2>Создать аккаунт</h2>
    <p class="subtitle">Зарегистрируйтесь, чтобы начать</p>

    @if (error) {
      <div class="alert alert-error">
        {{ error }}
      </div>
    }

    @if (success) {
      <div class="alert alert-success">
        {{ success }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="firstName">Имя</label>
        <input
          type="text"
          id="firstName"
          [(ngModel)]="firstName"
          name="firstName"
          placeholder="Введите имя"
          autocomplete="given-name"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="lastName">Фамилия</label>
        <input
          type="text"
          id="lastName"
          [(ngModel)]="lastName"
          name="lastName"
          placeholder="Введите фамилию"
          autocomplete="family-name"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Введите имя пользователя"
          autocomplete="username"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="email">Электронная почта</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="example@abai.edu.kz"
          autocomplete="email"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="course">Курс</label>
        <select
          id="course"
          [(ngModel)]="course"
          name="course"
          [disabled]="loading"
        >
          <option [ngValue]="1">1 курс</option>
          <option [ngValue]="2">2 курс</option>
          <option [ngValue]="3">3 курс</option>
          <option [ngValue]="4">4 курс</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Минимум 8 символов"
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Подтвердите пароль</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Повторите пароль"
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        {{ loading ? 'Создание аккаунта...' : 'Зарегистрироваться' }}
      </button>
    </form>

    <div class="auth-footer">
      Уже есть аккаунт?
      <a routerLink="/login">Войти</a>
    </div>
  </div>
</div>
